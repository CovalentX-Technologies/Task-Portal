<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CovalentX | Intern Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0066ff83;
            --bg: hsla(216, 33%, 3%, 0.681);
            --sidebar: rgba(13, 17, 23, 0.8);
            --card-glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR NAVIGATION --- */
        aside {
            width: 280px;
            background: var(--sidebar);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 50px;
            padding-left: 10px;
        }

        .logo-symbol {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .brand-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-label {
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
            margin: 25px 0 10px 10px;
        }

        .nav-btn {
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
            margin-bottom: 5px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(0, 242, 255, 0.1);
            color: var(--primary);
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.05);
        }

        /* --- MAIN CONTENT AREA --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 40px 60px;
            background: radial-gradient(circle at 50% 0%, rgba(0, 102, 255, 0.08) 0%, transparent 50%);
        }

        /* --- GLOBAL PROGRESS BAR --- */
        .progress-hub {
            background: var(--card-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .progress-track {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--secondary), var(--primary));
            box-shadow: 0 0 15px var(--primary);
        }

        /* --- TRACK DISPLAY --- */
        .track-header { margin-bottom: 30px; }
        .track-header h1 { font-size: 2.5rem; font-family: 'Space Grotesk'; }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .image-card {
            aspect-ratio: 16/10;
            background: #111;
            border-radius: 18px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .image-card:hover {
            transform: scale(1.03);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .card-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* --- TRUE FULLSCREEN OVERLAY --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; 
            height: 100vh;
            background: #000; 
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .overlay:fullscreen {
            background: #000;
        }

        #expandedImg {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        .close-btn {
            position: absolute;
            top: 30px; right: 40px;
            font-size: 3rem;
            color: var(--primary);
            cursor: pointer;
            z-index: 10001;
            line-height: 1;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* --- NAVIGATION ARROWS --- */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 4rem;
            color: var(--primary);
            cursor: pointer;
            z-index: 10002;
            padding: 20px;
            user-select: none;
            opacity: 0.5;
        }

        .nav-arrow:hover { opacity: 1; }
        .prev-arrow { left: 20px; }
        .next-arrow { right: 20px; }
    </style>
</head>
<body>

    <aside>
        <div class="logo-section">
            <div class="logo-symbol">CX</div>
            <div class="brand-text">CovalentX<br><span style="font-weight:300; font-size:1.5rem; color:var(--primary)">Technologies</span></div>
        </div>

        <span class="nav-label">General</span>
        <div class="nav-btn active" onclick="switchTrack('mandatory', this)">📌 Mandatory Tasks</div>

        <span class="nav-label">Internship Tracks</span>
        <div class="nav-btn" onclick="switchTrack('wd', this)">🌐 Web Development</div>
        <div class="nav-btn" onclick="switchTrack('ml', this)">🤖 Machine Learning</div>
        <div class="nav-btn" onclick="switchTrack('cs', this)">🛡️ Cyber Security</div>
        <div class="nav-btn" onclick="switchTrack('sm', this)">📱 Social Media</div>
    </aside>

    <main>
        <div class="progress-hub">
            <div>
                <p style="font-size: 0.7rem; color: var(--primary); font-weight: 800; letter-spacing: 1px;">TOTAL PROGRESS</p>
                <h3 id="progText">0%</h3>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progBar" style="width: 0%;"></div>
            </div>
            <div style="font-size: 0.8rem; opacity: 0.5;"></div>
        </div>

        <div class="track-header">
            <p id="trackType" style="color:var(--primary); font-weight:600; text-transform:uppercase; letter-spacing:2px;">-</p>
            <h1 id="trackName">-</h1>
        </div>

        <div class="image-grid" id="gridContent"></div>
    </main>

    <div class="overlay" id="lightbox">
        <span class="close-btn" onclick="closeBox()">&times;</span>
        <span class="nav-arrow prev-arrow" onclick="navImage(-1)">&#10094;</span>
        <img src="" id="expandedImg">
        <span class="nav-arrow next-arrow" onclick="navImage(1)">&#10095;</span>
    </div>

    <script>
        let currentTrackImages = [];
        let currentIndex = 0;

        const tracks = {
            mandatory: {
                name: "Mandatory Task Overview",
                type: "Onboarding",
                progress: 20,
                images: [
                    { title: "Task 1", file: "CS-2.jpg" },
                    { title: "Task 2", file: "CS-3.jpg" },
                    { title: "Task 3", file: "CS-4.jpg" },
                    
                ]
            },
            wd: {
                name: "Web Development",
                type: "Track: WD",
                progress: 45,
                images: [
                    { title: "Task 1", file: "CS-8.jpg" },
                    { title: "Task 2", file: "CS-9.jpg" },
                    { title: "Task 3", file: "CS-10.jpg" },
                    { title: "Task 4", file: "CS-11.jpg" },
                    { title: "Task 5", file: "CS-12.jpg" }
                ]
            },
            ml: {
                name: "Machine Learning",
                type: "Track: ML",
                progress: 60,
                images: [
                    { title: "Task 1", file: "CS-14.jpg" },
                    { title: "Task 2", file: "CS-15.jpg" },
                    { title: "Task 3", file: "CS-16.jpg" },
                    { title: "Task 4", file: "CS-17.jpg" },
                    { title: "Task 5", file: "CS-18.jpg" }
                ]
            },
            cs: {
                name: "Cyber Security",
                type: "Track: CS",
                progress: 80,
                images: [
                    { title: "Task 1", file: "CS-20.jpg" },
                    { title: "Task 2", file: "CS-21.jpg" },
                    { title: "Task 3", file: "CS-22.jpg" },
                    { title: "Task 4", file: "CS-23.jpg" },
                    { title: "Task 5", file: "CS-24.jpg" }
                ]
            },
            sm: {
                name: "Social Media",
                type: "Track: SM",
                progress: 100,
                images: [
                    { title: "Task 1", file: "CS-26.jpg" },
                    { title: "Task 2", file: "CS-27.jpg" },
                    { title: "Task 3", file: "CS-28.jpg" },
                    { title: "Task 4", file: "CS-29.jpg" },
                    { title: "Task 5", file: "CS-30.jpg" }
                ]
            }
        };

        function switchTrack(trackId, element) {
            const track = tracks[trackId];
            currentTrackImages = track.images;
            
            document.getElementById('trackName').innerText = track.name;
            document.getElementById('trackType').innerText = track.type;
            document.getElementById('progText').innerText = track.progress + "%";
            document.getElementById('progBar').style.width = track.progress + "%";

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(element) element.classList.add('active');

            const grid = document.getElementById('gridContent');
            grid.innerHTML = ''; 

            track.images.forEach((imgObj, index) => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.onclick = () => openBox(index);
                
                card.innerHTML = `
                    <img src="${imgObj.file}" alt="${imgObj.title}" onerror="this.src='https://via.placeholder.com/600x400/111/333?text=Missing+File'">
                    <div class="card-label">${imgObj.title}</div>
                `;
                grid.appendChild(card);
            });
        }

        function openBox(index) {
            currentIndex = index;
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('expandedImg');
            
            img.src = currentTrackImages[currentIndex].file;
            lb.style.display = 'flex';

            if (lb.requestFullscreen) {
                lb.requestFullscreen();
            } else if (lb.webkitRequestFullscreen) {
                lb.webkitRequestFullscreen();
            }

            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        }

        function navImage(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = currentTrackImages.length - 1;
            if (currentIndex >= currentTrackImages.length) currentIndex = 0;
            document.getElementById('expandedImg').src = currentTrackImages[currentIndex].file;
        }

        function closeBox() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
            document.getElementById('lightbox').style.display = 'none';
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.getElementById('lightbox').style.display = 'none';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === "ArrowLeft") navImage(-1);
                if (e.key === "ArrowRight") navImage(1);
                if (e.key === "Escape") closeBox();
            }
        });

        window.onload = () => {
            switchTrack('mandatory', document.querySelector('.nav-btn.active'));
        };
    </script>
</body>
</html>
